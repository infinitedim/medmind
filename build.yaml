# build.yaml — build_runner configuration for MedMind
#
# Isar data model files use @Collection() and @Embedded() annotations that
# cannot be resolved by source_gen-based generators in this project.
#
# ALL source_gen-based builders are excluded from lib/data/models/ so that:
#  1. No build errors from unresolvable Isar annotations.
#  2. --delete-conflicting-outputs does not wipe the pre-generated Isar
#     *.g.dart schema files (which are generated by tools/generate_isar_schemas.sh
#     and must be committed to version control).
#
# When you need to regenerate Isar schemas (after changing a model file):
#   bash tools/generate_isar_schemas.sh

targets:
  $default:
    builders:
      json_serializable:
        generate_for:
          include:
            - lib/**
          exclude:
            - lib/data/models/**
      source_gen|combining_builder:
        generate_for:
          include:
            - lib/**
          exclude:
            - lib/data/models/**
      injectable_generator|injectable_builder:
        generate_for:
          include:
            - lib/**
          exclude:
            - lib/data/models/**
      injectable_generator|injectable_config_builder:
        generate_for:
          include:
            - lib/**
          exclude:
            - lib/data/models/**
