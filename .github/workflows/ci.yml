name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run unit & widget tests
        run: flutter test test/ --coverage

      - name: Check coverage
        run: |
          sudo apt-get install -y lcov
          grep -vE '^SF:.*\.(g|freezed|gen)\.dart$' coverage/lcov.info \
            | grep -vE '^SF:.*/generated/' \
            > coverage/lcov_filtered.info
          mv coverage/lcov_filtered.info coverage/lcov.info
          genhtml coverage/lcov.info -o coverage/html
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | awk '{print $2}' | tr -d '%')
          echo "Coverage: $COVERAGE%"

  integration-test:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable KVM (Android Emulator acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration & E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          # Run a single combined entry-point so Flutter builds one APK and
          # installs it once, avoiding the DELETE_FAILED_INTERNAL_ERROR that
          # occurs when the runner tries to uninstall a non-existent package
          # before the very first test file.
          script: flutter test integration_test/all_tests.dart --timeout 120s

  build-android:
    runs-on: ubuntu-latest
    needs: [analyze-and-test, integration-test]
    if: github.ref == 'refs/heads/development' || github.ref == 'refs/heads/main'
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
      KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
      KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/medmind-upload-key.jks
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_STORE_PASSWORD
          keyPassword=$KEYSTORE_KEY_PASSWORD
          keyAlias=$KEYSTORE_KEY_ALIAS
          storeFile=medmind-upload-key.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: medmind-apk
          path: build/app/outputs/flutter-apk/app-release.apk
