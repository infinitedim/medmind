name: CI

on:
  push:
    branches: [development main]
  pull_request:
    branches: [development main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Check coverage
        run: |
          # Install lcov
          sudo apt-get install -y lcov
          # Remove generated files from coverage
          lcov --remove coverage/lcov.info \
            '**/*.g.dart' \
            '**/*.freezed.dart' \
            '**/*.gen.dart' \
            'lib/generated/*' \
            -o coverage/lcov.info
          # Generate coverage report
          genhtml coverage/lcov.info -o coverage/html
          # Check minimum coverage (Phase 1: 60%, akan dinaikkan bertahap)
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | awk '{print $2}' | tr -d '%')
          echo "Coverage: $COVERAGE%"
          # Uncomment saat sudah siap enforce:
          # if (( $(echo "$COVERAGE < 60" | bc -l) )); then exit 1; fi

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: medmind-apk
          path: build/app/outputs/flutter-apk/app-release.apk
