name: ML Pipeline

on:
  push:
    branches: [development, main]
    paths:
      - "ml/**"
      - ".github/workflows/ml.yml"
  pull_request:
    branches: [development, main]
    paths:
      - "ml/**"
      - ".github/workflows/ml.yml"

jobs:
  validate-dependencies:
    name: Validate ML Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt

      - name: Check for dependency conflicts
        run: pip check

  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check ml/ --exclude ml/.venv

      - name: Check formatting with ruff
        run: ruff format --check ml/ --exclude ml/.venv

  validate-notebooks:
    name: Validate Notebook Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install nbformat
        run: pip install nbformat

      - name: Validate notebook format
        run: |
          python - <<'EOF'
          import nbformat
          import sys
          from pathlib import Path

          notebooks = list(Path("ml/notebooks").glob("*.ipynb"))
          if not notebooks:
              print("No notebooks found.")
              sys.exit(1)

          errors = []
          for nb_path in notebooks:
              try:
                  with open(nb_path) as f:
                      nb = nbformat.read(f, as_version=4)
                  nbformat.validate(nb)
                  print(f"OK: {nb_path.name}")
              except nbformat.ValidationError as e:
                  errors.append(f"FAIL: {nb_path.name} — {e}")

          if errors:
              for err in errors:
                  print(err)
              sys.exit(1)
          EOF

  validate-models:
    name: Validate TFLite Models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tflite-runtime
        run: pip install tflite-runtime

      - name: Check model files exist and are non-empty
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path

          expected_models = [
              "ml/models/anomaly_detection_v1.tflite",
              "ml/models/npl_symptom_v1.tflite",
              "ml/models/symptom_correlation_v1.tflite",
          ]

          errors = []
          for model_path in expected_models:
              p = Path(model_path)
              if not p.exists():
                  errors.append(f"MISSING: {model_path}")
              elif p.stat().st_size == 0:
                  errors.append(f"EMPTY: {model_path}")
              else:
                  print(f"OK: {p.name} ({p.stat().st_size} bytes)")

          if errors:
              for err in errors:
                  print(err)
              sys.exit(1)
          EOF

      - name: Validate TFLite model integrity
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path

          try:
              import tflite_runtime.interpreter as tflite
          except ImportError:
              import tensorflow as tf
              tflite = tf.lite

          models = list(Path("ml/models").glob("*.tflite"))
          errors = []

          for model_path in models:
              try:
                  interpreter = tflite.Interpreter(model_path=str(model_path))
                  interpreter.allocate_tensors()
                  input_details = interpreter.get_input_details()
                  output_details = interpreter.get_output_details()
                  print(f"OK: {model_path.name} | inputs={len(input_details)} outputs={len(output_details)}")
              except Exception as e:
                  errors.append(f"FAIL: {model_path.name} — {e}")

          if errors:
              for err in errors:
                  print(err)
              sys.exit(1)
          EOF

  # Job ini hanya berjalan di push ke main/development (bukan PR)
  # untuk memastikan model di-commit sudah sinkron dengan assets Flutter
  sync-models-check:
    name: Check Models Synced to Flutter Assets
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Verify model files exist in ml/models
        run: |
          missing=0
          for model in \
            "ml/models/anomaly_detection_v1.tflite" \
            "ml/models/npl_symptom_v1.tflite" \
            "ml/models/symptom_correlation_v1.tflite"; do
            if [ ! -f "$model" ]; then
              echo "MISSING: $model"
              missing=1
            else
              echo "OK: $model"
            fi
          done
          exit $missing

      - name: Check pubspec.yaml includes model assets
        run: |
          if grep -q "ml/models" pubspec.yaml; then
            echo "OK: ml/models assets declared in pubspec.yaml"
          else
            echo "WARNING: ml/models not found in pubspec.yaml assets section"
            echo "Pastikan assets model TFLite sudah didaftarkan di pubspec.yaml"
            exit 1
          fi
