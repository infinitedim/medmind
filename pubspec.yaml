name: medmind

description: "A privacy-first health journal that runs AI/ML symptom analysis entirely on-device using TensorFlow Lite, correlates patterns across symptoms, medications, sleep, and lifestyle factors, and surfaces actionable health insights — without ever sending personal health data to a server."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3
  path_provider: ^2.1.5
  intl: ^0.20.2
  logger: ^2.6.2
  dartz: ^0.10.1
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0
  flutter_animate: ^4.5.0
  flutter_native_splash: ^2.4.7
  local_auth: ^3.0.1
  shared_preferences: ^2.3.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0
  build_runner: ^2.12.2
  freezed: ^3.1.0
  json_serializable: ^6.13.0
  injectable_generator: ^2.7.1
  riverpod_generator: ^4.0.3
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  min_sdk_android: 26
  adaptive_icon_background: "#09090b"
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png

flutter_native_splash:
  color: "#09090b"
  image: assets/icon/medmind-logo.png
  android: true
  ios: false
  android_gravity: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
