name: medmind

description: "A privacy-first health journal that runs AI/ML symptom analysis entirely on-device using TensorFlow Lite, correlates patterns across symptoms, medications, sleep, and lifestyle factors, and surfaces actionable health insights — without ever sending personal health data to a server."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  go_router: ^17.1.0
  flutter_secure_storage: ^8.1.0
  encrypt: ^5.0.3
  path_provider: ^2.0.15
  intl: ^0.20.2
  logger: ^2.6.2
  dartz: ^0.10.1
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0
  build_runner: ^2.11.1
  freezed: ^3.1.0
  json_serializable: ^6.13.0
  injectable_generator: ^2.7.1
  riverpod_generator: ^4.0.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
