<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#14b8a6", // teal-500 equivalent for primary
                        "background-light": "#f8f6f6",
                        "background-dark": "#09090b", // zinc-950
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>MedMind Journal Entry</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-zinc-50 min-h-screen">
<!-- AppBar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-zinc-200 dark:border-zinc-800">
<div class="flex items-center justify-between px-4 h-16">
<div class="flex items-center gap-3">
<button class="p-2 -ml-2 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">New Entry</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-xs text-zinc-500 mr-2">Saving...</span>
<button class="px-3 py-1.5 text-sm font-medium text-zinc-400 hover:text-zinc-300 transition-colors">Save Draft</button>
<button class="px-4 py-1.5 bg-primary text-zinc-50 text-sm font-semibold rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">Save</button>
</div>
</div>
<!-- Tab Bar -->
<div class="flex px-4 overflow-x-auto no-scrollbar">
<button class="flex-none px-4 py-3 text-sm font-semibold text-primary border-b-2 border-primary whitespace-nowrap">
                Mood &amp; Symptoms
            </button>
<button class="flex-none px-4 py-3 text-sm font-medium text-zinc-500 dark:text-zinc-400 border-b-2 border-transparent hover:text-zinc-700 dark:hover:text-zinc-300 whitespace-nowrap">
                Sleep &amp; Meds
            </button>
<button class="flex-none px-4 py-3 text-sm font-medium text-zinc-500 dark:text-zinc-400 border-b-2 border-transparent hover:text-zinc-700 dark:hover:text-zinc-300 whitespace-nowrap">
                Vitals
            </button>
<button class="flex-none px-4 py-3 text-sm font-medium text-zinc-500 dark:text-zinc-400 border-b-2 border-transparent hover:text-zinc-700 dark:hover:text-zinc-300 whitespace-nowrap">
                Lifestyle &amp; Notes
            </button>
</div>
</header>
<main class="max-w-2xl mx-auto p-4 space-y-8">
<!-- Date Selector Card -->
<div class="bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="p-2 bg-zinc-200 dark:bg-zinc-800 rounded-lg text-primary">
<span class="material-symbols-outlined">calendar_today</span>
</div>
<div>
<p class="text-xs font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wider">Entry Date</p>
<p class="text-sm font-semibold">October 24, 2023</p>
</div>
</div>
<button class="text-zinc-400">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Mood Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-widest">How are you feeling?</h2>
</div>
<div class="grid grid-cols-5 gap-2">
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800/50 transition-colors">
<span class="text-2xl">🤩</span>
<span class="text-[10px] font-bold uppercase text-zinc-500">Great</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800/50 transition-colors">
<span class="text-2xl">😊</span>
<span class="text-[10px] font-bold uppercase text-zinc-500">Good</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border-2 border-zinc-400 dark:border-zinc-600 bg-zinc-200 dark:bg-zinc-800">
<span class="text-2xl">😐</span>
<span class="text-[10px] font-bold uppercase text-zinc-100">Okay</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800/50 transition-colors">
<span class="text-2xl">😔</span>
<span class="text-[10px] font-bold uppercase text-zinc-500">Bad</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800/50 transition-colors">
<span class="text-2xl">😫</span>
<span class="text-[10px] font-bold uppercase text-zinc-500">Terrible</span>
</button>
</div>
<!-- Intensity Slider -->
<div class="pt-6 px-2">
<div class="flex justify-between items-center mb-4">
<span class="text-sm font-medium text-zinc-400">Intensity</span>
<span class="px-2 py-0.5 bg-primary/10 text-primary text-sm font-bold rounded">7/10</span>
</div>
<div class="relative w-full h-2 bg-zinc-200 dark:bg-zinc-800 rounded-full">
<div class="absolute top-0 left-0 h-full w-[70%] bg-primary rounded-full"></div>
<div class="absolute top-1/2 left-[70%] -translate-y-1/2 -translate-x-1/2 size-5 bg-white border-2 border-primary rounded-full shadow-lg"></div>
</div>
</div>
</section>
<!-- Symptoms Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-widest">Symptoms Today</h2>
<button class="text-xs font-bold text-primary flex items-center gap-1 hover:underline">
<span class="material-symbols-outlined text-sm">add</span>
                    ADD
                </button>
</div>
<div class="space-y-3">
<!-- Symptom Card 1 -->
<div class="flex items-center justify-between p-4 bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl">
<div class="flex flex-col">
<span class="text-base font-semibold">Headache</span>
<span class="text-xs text-zinc-500">Started 2:00 PM</span>
</div>
<div class="flex items-center gap-4">
<span class="px-3 py-1 bg-amber-900/20 text-amber-500 dark:text-amber-400 text-[10px] font-bold uppercase tracking-wider rounded-full border border-amber-900/30">
                            Moderate
                        </span>
<button class="text-zinc-400 hover:text-zinc-200">
<span class="material-symbols-outlined text-xl">more_vert</span>
</button>
</div>
</div>
<!-- Symptom Card 2 -->
<div class="flex items-center justify-between p-4 bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl">
<div class="flex flex-col">
<span class="text-base font-semibold">Fatigue</span>
<span class="text-xs text-zinc-500">All Day</span>
</div>
<div class="flex items-center gap-4">
<span class="px-3 py-1 bg-emerald-900/30 text-emerald-500 dark:text-emerald-400 text-[10px] font-bold uppercase tracking-wider rounded-full border border-emerald-900/40">
                            Mild
                        </span>
<button class="text-zinc-400 hover:text-zinc-200">
<span class="material-symbols-outlined text-xl">more_vert</span>
</button>
</div>
</div>
<!-- Add placeholder -->
<button class="w-full py-4 border-2 border-dashed border-zinc-200 dark:border-zinc-800 rounded-xl flex flex-col items-center justify-center gap-1 text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-900/50 transition-colors">
<span class="material-symbols-outlined">add_circle</span>
<span class="text-sm font-medium">Add another symptom</span>
</button>
</div>
</section>
<!-- Quick Note -->
<section class="space-y-4 pt-4">
<h2 class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-widest">Quick Note</h2>
<textarea class="w-full bg-zinc-100 dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 rounded-xl text-sm focus:ring-primary focus:border-primary min-h-[100px]" placeholder="How was your day overall?"></textarea>
</section>
</main>
<footer class="p-8 text-center text-zinc-500 text-xs">
        MedMind Journal • Your Privacy is Protected
    </footer>
</body></html>
