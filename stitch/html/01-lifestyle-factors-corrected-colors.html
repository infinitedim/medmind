<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedMind Onboarding - Step 3</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    /* Simple transition for collapsible sections */
    .collapse-content {
      transition: max-height 0.3s ease-out;
      overflow: hidden;
    }
    .rotated-chevron {
      transform: rotate(180deg);
    }
  </style>
</head>
<body class="bg-[#09090B] text-[#FAFAFA] font-sans min-h-screen flex flex-col">
<!-- BEGIN: MainHeader -->
<header class="bg-[#18181B] border-b border-[#27272A] sticky top-0 z-10 p-4 flex items-center justify-between" data-purpose="app-bar">
<button aria-label="Go back" class="p-2 -ml-2 text-[#A1A1AA] hover:bg-[#27272A] rounded-full transition-colors">
<svg fill="none" height="24" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<span class="text-sm font-semibold text-[#A1A1AA] uppercase tracking-wider">3 of 4</span>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- END: MainHeader -->
<!-- BEGIN: ContentArea -->
<main class="flex-1 p-6 pb-32">
<!-- Intro Typography -->
<section class="mb-8" data-purpose="heading-section">
<h1 class="text-3xl font-bold text-[#FAFAFA] tracking-tight">Lifestyle factors to track</h1>
<p class="mt-2 text-[#A1A1AA] text-lg">Select habits that influence your health to see correlations with your symptoms.</p>
</section>
<!-- Factors Accordion -->
<div class="space-y-4" data-purpose="lifestyle-categories">
<!-- BEGIN: FoodAndDrinkSection -->
<section class="bg-[#18181B] rounded-2xl border border-[#27272A] overflow-hidden shadow-sm">
<button class="w-full flex items-center justify-between p-5 text-left focus:outline-none" data-purpose="accordion-trigger">
<div class="flex items-center gap-3">
<span class="text-2xl">🍎</span>
<h3 class="text-lg font-bold text-[#FAFAFA]">Food &amp; Drink</h3>
</div>
<svg class="w-5 h-5 text-[#A1A1AA] rotated-chevron" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<div class="p-5 pt-0 flex flex-wrap gap-3" data-purpose="chip-container"><!-- Selected Chip with Control -->
<div class="w-full mb-2">
<div class="flex items-center justify-between p-4 bg-[#14B8A6]/20 border-2 border-[#2DD4BF] rounded-xl">
<div class="flex items-center gap-3">
<span class="text-xl">💧</span>
<span class="font-semibold text-[#2DD4BF]">Water Intake</span>
</div>
<div class="flex items-center bg-[#18181B] rounded-lg border border-[#2DD4BF]/30 p-1 shadow-sm">
<button class="w-8 h-8 flex items-center justify-center text-[#2DD4BF] font-bold hover:bg-[#2DD4BF]/10 rounded">-</button>
<span class="px-3 font-mono font-bold text-[#2DD4BF]">1.5L</span>
<button class="w-8 h-8 flex items-center justify-center text-[#2DD4BF] font-bold hover:bg-[#2DD4BF]/10 rounded">+</button>
</div>
</div>
</div>
<!-- Selected Factor -->
<button class="flex items-center gap-2 px-4 py-2 bg-[#14B8A6]/20 border-2 border-[#2DD4BF] rounded-full transition-all text-[#2DD4BF]">
<span class="text-lg">☕</span>
<span class="font-medium">Caffeine</span>
<svg class="w-4 h-4 text-[#2DD4BF]" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
</button>
<!-- Standard Factors -->
<button class="flex items-center gap-2 px-4 py-2 bg-[#18181B] border border-[#27272A] text-[#A1A1AA] rounded-full hover:border-[#A1A1AA] transition-all">
<span>🥦</span>
<span class="font-medium">Fiber</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-[#18181B] border border-[#27272A] text-[#A1A1AA] rounded-full hover:border-[#A1A1AA] transition-all">
<span>🧁</span>
<span class="font-medium">Sugar</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-[#18181B] border border-[#27272A] text-[#A1A1AA] rounded-full hover:border-[#A1A1AA] transition-all">
<span>🍺</span>
<span class="font-medium">Alcohol</span>
</button></div>
</section>
<!-- END: FoodAndDrinkSection -->
<!-- BEGIN: PhysicalSection -->
<section class="bg-[#18181B] rounded-2xl border border-[#27272A] overflow-hidden shadow-sm">
<button class="w-full flex items-center justify-between p-5 text-left focus:outline-none" data-purpose="accordion-trigger">
<div class="flex items-center gap-3">
<span class="text-2xl">🏃‍♂️</span>
<h3 class="text-lg font-bold text-[#FAFAFA]">Physical</h3>
</div>
<svg class="w-5 h-5 text-[#A1A1AA] rotated-chevron" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</section>
<!-- END: PhysicalSection -->
<!-- BEGIN: MentalSection -->
<section class="bg-[#18181B] rounded-2xl border border-[#27272A] overflow-hidden shadow-sm">
<button class="w-full flex items-center justify-between p-5 text-left focus:outline-none" data-purpose="accordion-trigger">
<div class="flex items-center gap-3">
<span class="text-2xl">🧠</span>
<h3 class="text-lg font-bold text-[#FAFAFA]">Mental</h3>
</div>
<svg class="w-5 h-5 text-[#A1A1AA] rotated-chevron" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<!-- Expanded Example for Scale -->
<div class="p-5 pt-0 space-y-4" data-purpose="scale-content"><div class="p-4 bg-[#14B8A6]/20 border-2 border-[#2DD4BF] rounded-xl">
<div class="flex justify-between items-center mb-4">
<div class="flex items-center gap-3">
<span class="text-xl">😰</span>
<span class="font-semibold text-[#2DD4BF]">Stress Level</span>
</div>
<span class="text-[#FBBF24] font-bold bg-[#451a03]/40 px-2 py-1 rounded border border-[#FBBF24]/20 shadow-sm">6/10</span>
</div>
<!-- Numeric Scale Control -->
<div class="flex justify-between gap-1">
<button class="w-full h-8 bg-[#18181B] border border-[#27272A] rounded flex items-center justify-center text-xs font-bold text-[#A1A1AA] hover:border-[#A1A1AA] transition-colors">1</button>
<button class="w-full h-8 bg-[#18181B] border border-[#27272A] rounded flex items-center justify-center text-xs font-bold text-[#A1A1AA] hover:border-[#A1A1AA] transition-colors">2</button>
<button class="w-full h-8 bg-[#18181B] border border-[#27272A] rounded flex items-center justify-center text-xs font-bold text-[#A1A1AA] hover:border-[#A1A1AA] transition-colors">3</button>
<button class="w-full h-8 bg-[#18181B] border border-[#27272A] rounded flex items-center justify-center text-xs font-bold text-[#A1A1AA] hover:border-[#A1A1AA] transition-colors">4</button>
<button class="w-full h-8 bg-[#18181B] border border-[#27272A] rounded flex items-center justify-center text-xs font-bold text-[#A1A1AA] hover:border-[#A1A1AA] transition-colors">5</button>
<button class="w-full h-8 bg-[#14B8A6] border border-[#14B8A6] rounded flex items-center justify-center text-xs font-bold text-[#09090B]">6</button>
<button class="w-full h-8 bg-[#18181B] border border-[#27272A] rounded flex items-center justify-center text-xs font-bold text-[#A1A1AA] hover:border-[#A1A1AA] transition-colors">7</button>
<button class="w-full h-8 bg-[#18181B] border border-[#27272A] rounded flex items-center justify-center text-xs font-bold text-[#A1A1AA] hover:border-[#A1A1AA] transition-colors">8</button>
</div>
</div></div>
</section>
<!-- END: MentalSection -->
</div>
</main>
<!-- END: ContentArea -->
<!-- BEGIN: StickyFooter -->
<footer class="fixed bottom-0 left-0 right-0 bg-[#09090B]/80 backdrop-blur-md border-t border-[#27272A] p-6 flex flex-col items-center gap-4 shadow-[0_-4px_20px_rgba(0,0,0,0.2)]" data-purpose="footer-controls">
<p class="text-sm font-medium text-[#A1A1AA]">3 factors selected</p>
<button class="w-full max-w-md py-4 bg-[#14B8A6] hover:bg-[#0D9488] active:scale-[0.98] text-[#09090B] font-bold rounded-2xl shadow-lg shadow-[#14B8A6]/10 transition-all text-lg">
      Continue
    </button>
</footer>
<!-- END: StickyFooter -->
</body></html>
