<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedMind Onboarding - Security Setup</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://unpkg.com/lucide@latest"></script></head>
<body class="bg-zinc-950 text-zinc-50 font-sans antialiased">
<!-- BEGIN: MainContainer -->
<main class="flex flex-col min-h-screen max-w-md mx-auto bg-zinc-950 shadow-xl relative overflow-hidden">
<!-- BEGIN: AppBar -->
<header class="flex items-center justify-between px-6 py-4 border-b border-zinc-800" data-purpose="navigation-header">
<button aria-label="Go back" class="p-2 -ml-2 text-zinc-600 hover:text-zinc-900 transition-colors">
<svg class="h-6 w-6 text-zinc-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<span class="text-sm font-semibold text-zinc-400 tracking-wider">4 OF 4</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- END: AppBar -->
<!-- BEGIN: ContentArea -->
<section class="flex-grow px-6 pt-8 pb-4 space-y-8" data-purpose="onboarding-content">
<!-- Heading Section -->
<div class="space-y-2">
<h1 class="text-3xl font-bold tracking-tight text-zinc-50">Protect your data</h1>
<p class="text-zinc-400 text-lg leading-relaxed">Secure your medical history and prescriptions with an extra layer of protection.</p>
</div>
<!-- BEGIN: Illustration -->
<div class="flex justify-center py-6" data-purpose="security-illustration">
<div class="relative w-[120px] h-[120px] bg-[#18181B] rounded-full flex items-center justify-center border border-[#27272A] shadow-[0_0_30px_rgba(20,184,166,0.15)]">
<i class="w-[48px] h-[48px] text-[#2DD4BF]" data-lucide="fingerprint"></i>
</div>
</div>
<!-- END: Illustration -->
<!-- BEGIN: SettingsCards -->
<div class="space-y-4" data-purpose="security-settings">
<!-- Biometric Toggle -->
<div class="flex items-center justify-between p-4 bg-zinc-900 rounded-2xl border border-zinc-800 shadow-sm">
<div class="flex flex-col"><div class="flex items-center gap-3 mb-1"><i class="w-5 h-5 text-[#2DD4BF]" data-lucide="fingerprint"></i></div>
<span class="font-semibold text-zinc-50">Enable Biometric Lock</span>
<span class="text-xs text-zinc-400">FaceID or Fingerprint</span>
</div>
<button aria-checked="true" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-teal-500" role="switch" type="button">
<span class="translate-x-5 pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
</div>
<!-- Auto-lock Dropdown -->
<div class="flex items-center justify-between p-4 bg-zinc-900 rounded-2xl border border-zinc-800 shadow-sm">
<label class="font-semibold text-zinc-50" for="auto-lock">Auto-lock after</label>
<select class="bg-transparent border-none text-teal-400 font-medium focus:ring-0 cursor-pointer py-0 pr-8" id="auto-lock">
<option value="1">1 minute</option>
<option selected="" value="5">5 minutes</option>
<option value="10">10 minutes</option>
<option value="never">Never</option>
</select>
</div>
</div>
<!-- END: SettingsCards -->
<!-- BEGIN: EncryptionInfo -->
<div class="flex gap-4 p-5 bg-zinc-900 rounded-2xl border-l-2 border-teal-500 shadow-lg" data-purpose="encryption-info">
<div class="flex-shrink-0 pt-1">
<svg class="h-6 w-6 text-teal-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div class="space-y-1">
<h4 class="text-zinc-50 font-semibold text-sm">Hardware-level Encryption</h4>
<p class="text-zinc-400 text-xs leading-relaxed">Your sensitive health data is stored securely using Keystore/Secure Enclave technology. Even we can't access it.</p>
</div>
</div>
<!-- END: EncryptionInfo -->
</section>
<!-- END: ContentArea -->
<!-- BEGIN: Footer -->
<footer class="p-6 space-y-3 bg-zinc-950 border-t border-zinc-800" data-purpose="footer-actions">
<button class="w-full py-4 px-6 bg-teal-500 hover:bg-teal-600 text-zinc-950 font-bold rounded-2xl transition-all shadow-lg shadow-teal-500/10 active:scale-[0.98]">
        Finish Setup
      </button>
<button class="w-full py-3 px-6 text-zinc-400 hover:text-zinc-200 font-medium transition-colors bg-transparent">
        Set Up Later
      </button>
</footer>
<!-- END: Footer -->
</main>
<!-- END: MainContainer -->
<style data-purpose="custom-select-styling">
    /* Remove default focus ring on select for cleaner look on mobile */
    select:focus {
      outline: none;
      box-shadow: none;
    }
  </style>
<script>lucide.createIcons();</script></body></html>
