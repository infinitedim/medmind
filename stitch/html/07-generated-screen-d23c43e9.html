<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedMind Onboarding - Step 2</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration for Custom Colors -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: {
              400: '#2dd4bf',
              500: '#14b8a6',
            },
            zinc: {
              800: '#27272a',
              900: '#18181b',
              950: '#09090b',
            }
          }
        }
      }
    }
  </script>
<!-- Lucide Icons (CDN) for general UI icons -->
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans selection:bg-teal-500/30">
<!-- BEGIN: MainContainer -->
<main class="max-w-md mx-auto min-h-screen flex flex-col relative pb-32">
<!-- BEGIN: AppBar -->
<header class="sticky top-0 z-20 bg-zinc-950/80 backdrop-blur-md px-4 py-4 border-b border-zinc-800 flex items-center justify-between">
<div class="flex items-center gap-3">
<button aria-label="Go back" class="p-2 -ml-2 text-zinc-400 hover:text-white">
<i class="w-6 h-6" data-lucide="chevron-left"></i>
</button>
<h2 class="text-lg font-semibold tracking-tight">Select Symptoms</h2>
</div>
<div class="px-3 py-1 bg-zinc-900 rounded-full border border-zinc-800">
<span class="text-xs font-medium text-teal-400">2 of 4</span>
</div>
</header>
<!-- END: AppBar -->
<!-- BEGIN: ContentArea -->
<section class="px-4 pt-8 pb-4">
<!-- Title Section -->
<div class="mb-8" data-purpose="heading-group">
<h1 class="text-2xl font-bold mb-2">What would you like to track?</h1>
<p class="text-zinc-400 text-sm">Select symptoms you've experienced recently to customize your dashboard.</p>
</div>
<!-- Search Input -->
<div class="relative mb-6" data-purpose="search-container">
<div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
<i class="w-4 h-4 text-zinc-500" data-lucide="search"></i>
</div>
<input class="w-full bg-zinc-900 border-zinc-800 text-sm rounded-xl py-3 pl-10 pr-4 focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all outline-none" placeholder="Search symptoms..." type="text"/>
</div>
<!-- Filter Chips -->
<nav class="flex overflow-x-auto gap-2 mb-8 no-scrollbar" data-purpose="filter-scroll">
<button class="whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-semibold bg-teal-500/20 text-teal-400 border border-teal-500/30">All</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-semibold bg-zinc-900 text-zinc-400 border border-zinc-800">Neurological</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-semibold bg-zinc-900 text-zinc-400 border border-zinc-800">Digestive</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-semibold bg-zinc-900 text-zinc-400 border border-zinc-800">Physical</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-semibold bg-zinc-900 text-zinc-400 border border-zinc-800">Mood</button>
</nav>
<!-- Symptom Grid -->
<div class="grid grid-cols-2 gap-3" data-purpose="symptom-grid">
<!-- Card: Headache (Selected) -->
<button class="flex flex-col items-start p-4 bg-zinc-900 border-2 border-teal-500 shadow-[0_0_15px_rgba(20,184,166,0.15)] rounded-2xl relative text-left transition-all">
<div class="absolute top-2 right-2 bg-teal-500 rounded-full p-0.5">
<i class="w-3 h-3 text-zinc-950" data-lucide="check"></i>
</div>
<span class="text-2xl mb-2">🤕</span>
<span class="font-semibold text-sm">Headache</span>
<span class="text-[10px] uppercase tracking-wider text-teal-400 font-bold mt-1">Neurological</span>
</button>
<!-- Card: Fatigue (Selected) -->
<button class="flex flex-col items-start p-4 bg-zinc-900 border-2 border-teal-500 shadow-[0_0_15px_rgba(20,184,166,0.15)] rounded-2xl relative text-left transition-all">
<div class="absolute top-2 right-2 bg-teal-500 rounded-full p-0.5">
<i class="w-3 h-3 text-zinc-950" data-lucide="check"></i>
</div>
<span class="text-2xl mb-2">🥱</span>
<span class="font-semibold text-sm">Fatigue</span>
<span class="text-[10px] uppercase tracking-wider text-teal-400 font-bold mt-1">General</span>
</button>
<!-- Card: Anxiety -->
<button class="flex flex-col items-start p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-left hover:border-zinc-700 transition-all">
<span class="text-2xl mb-2">😰</span>
<span class="font-semibold text-sm text-zinc-200">Anxiety</span>
<span class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold mt-1">Mental</span>
</button>
<!-- Card: Nausea -->
<button class="flex flex-col items-start p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-left hover:border-zinc-700 transition-all">
<span class="text-2xl mb-2">🤢</span>
<span class="font-semibold text-sm text-zinc-200">Nausea</span>
<span class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold mt-1">Digestive</span>
</button>
<!-- Card: Back Pain -->
<button class="flex flex-col items-start p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-left hover:border-zinc-700 transition-all">
<span class="text-2xl mb-2">⚡</span>
<span class="font-semibold text-sm text-zinc-200">Back Pain</span>
<span class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold mt-1">Physical</span>
</button>
<!-- Card: Sleep Issues -->
<button class="flex flex-col items-start p-4 bg-zinc-900 border border-zinc-800 rounded-2xl text-left hover:border-zinc-700 transition-all">
<span class="text-2xl mb-2">🌙</span>
<span class="font-semibold text-sm text-zinc-200">Sleep Issues</span>
<span class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold mt-1">Rest</span>
</button>
</div>
</section>
<!-- END: ContentArea -->
<!-- BEGIN: StickyFooter -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-zinc-950/90 backdrop-blur-lg border-t border-zinc-800 px-4 py-6 z-30">
<div class="flex items-center justify-between gap-4">
<div class="flex flex-col">
<span class="text-xs text-zinc-400 uppercase tracking-widest font-bold">Selected</span>
<span class="text-lg font-bold text-white">2 <span class="text-sm font-normal text-zinc-500">symptoms</span></span>
</div>
<button class="flex-1 bg-teal-500 hover:bg-teal-400 text-zinc-950 font-bold py-4 px-6 rounded-2xl transition-colors shadow-lg shadow-teal-500/20 active:scale-[0.98]">
          Continue
        </button>
</div>
</footer>
<!-- END: StickyFooter -->
</main>
<!-- END: MainContainer -->
<style data-purpose="custom-layout">
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
<script data-purpose="icon-initialization">
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body></html>
