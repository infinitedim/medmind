<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;family=Inter:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#09090b", // Modified to Zinc 950 as per request
                    },
                    fontFamily: {
                        "display": ["Inter", "Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.25rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 1.5s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display antialiased">
<!-- Full bleed container -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden px-6">
<!-- Safe area top simulation -->
<div class="absolute top-0 h-6 w-full"></div>
<!-- Centered Brand Block -->
<div class="flex flex-col items-center gap-6">
<!-- Logo Container: 80x80 with 20px (rounded-2xl) radius -->
<div class="flex h-20 w-20 items-center justify-center rounded-2xl bg-teal-500/15">
<span class="material-symbols-outlined text-teal-500 text-[40px]" data-icon="favorite">
                    favorite
                </span>
</div>
<!-- Text Content -->
<div class="flex flex-col items-center gap-2">
<h1 class="text-[32px] font-bold leading-tight tracking-tight text-zinc-50">
                    MedMind
                </h1>
<p class="text-[14px] font-normal leading-normal text-zinc-400">
                    Your private health journal
                </p>
</div>
<!-- Circular Progress Indicator -->
<div class="mt-4">
<div class="relative h-6 w-6">
<!-- Background circle -->
<svg class="h-6 w-6 transform -rotate-90">
<circle class="text-teal-500/20" cx="12" cy="12" fill="transparent" r="10" stroke="currentColor" stroke-width="2.5"></circle>
<!-- Animated Progress circle -->
<circle class="text-teal-500 animate-spin-slow origin-center" cx="12" cy="12" fill="transparent" r="10" stroke="currentColor" stroke-dasharray="62.83" stroke-dashoffset="40" stroke-linecap="round" stroke-width="2.5"></circle>
</svg>
</div>
</div>
</div>
<!-- Footer / State status -->
<div class="absolute bottom-12 flex flex-col items-center gap-3 w-full max-w-xs">
<div class="flex w-full items-center justify-between">
<p class="text-zinc-500 text-xs font-medium uppercase tracking-widest">Initializing...</p>
</div>
<!-- Progress Bar -->
<div class="h-1 w-full overflow-hidden rounded-full bg-zinc-800">
<div class="h-full w-1/3 rounded-full bg-teal-500"></div>
</div>
</div>
</div>
<!-- Background Decoration (Subtle subtle gradient to break solid black) -->
<div class="pointer-events-none absolute inset-0 z-[-1] opacity-20">
<div class="absolute top-[-10%] left-[-10%] h-[40%] w-[40%] rounded-full bg-teal-500/10 blur-[120px]" data-alt="Abstract teal glow pattern"></div>
<div class="absolute bottom-[-10%] right-[-10%] h-[40%] w-[40%] rounded-full bg-primary/5 blur-[120px]" data-alt="Abstract warm accent glow"></div>
</div>
</body></html>
