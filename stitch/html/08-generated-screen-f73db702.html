<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedMind Onboarding - Welcome</title>
<!-- Inter font from Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 CDN with required plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zinc: {
              950: '#09090b',
            },
            teal: {
              400: '#2dd4bf',
              500: '#14b8a6',
            }
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px 2px rgba(20, 184, 166, 0.3); }
      50% { box-shadow: 0 0 40px 8px rgba(20, 184, 166, 0.5); }
    }
    .brand-glow {
      animation: glow 4s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-50 font-inter antialiased">
<!-- BEGIN: MainContainer -->
<!-- Designed for Pixel 9 Pro dimensions (411x916) but responsive -->
<main class="min-h-screen flex flex-col items-center justify-between px-8 py-12 max-w-[411px] mx-auto">
<!-- BEGIN: BrandIdentity -->
<section class="flex flex-col items-center mt-12 text-center" data-purpose="branding">
<!-- Icon Container -->
<div class="relative mb-8">
<!-- Outer Glow and Circle -->
<div class="brand-glow w-20 h-20 rounded-full bg-teal-500/10 flex items-center justify-center border border-teal-500/20">
<!-- Brain Icon (SVG representation) -->
<svg class="text-teal-400" fill="none" height="40" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="40" xmlns="http://www.w3.org/2000/svg">
<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.04Z"></path>
<path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.04Z"></path>
</svg>
</div>
</div>
<!-- App Name -->
<h1 class="text-[32px] font-bold tracking-tight mb-4">MedMind</h1>
<!-- Tagline with line breaks -->
<p class="text-zinc-400 text-sm leading-relaxed max-w-[280px]">
        Track symptoms. Discover patterns.<br/>Own your health data.
      </p>
<!-- BEGIN: FeaturePills -->
<div class="flex flex-wrap justify-center gap-2 mt-8" data-purpose="feature-tags">
<span class="px-3 py-1 text-[12px] font-medium bg-zinc-900 border border-zinc-700 rounded-full text-zinc-300">On-device AI</span>
<span class="px-3 py-1 text-[12px] font-medium bg-zinc-900 border border-zinc-700 rounded-full text-zinc-300">100% Private</span>
<span class="px-3 py-1 text-[12px] font-medium bg-zinc-900 border border-zinc-700 rounded-full text-zinc-300">Offline-first</span>
</div>
<!-- END: FeaturePills -->
</section>
<!-- END: BrandIdentity -->
<!-- BEGIN: FooterActions -->
<section class="w-full flex flex-col items-center gap-6" data-purpose="onboarding-controls">
<!-- Primary Action -->
<button class="w-full py-4 bg-teal-500 hover:bg-teal-600 active:scale-[0.98] transition-all rounded-xl text-zinc-950 font-bold text-base shadow-lg shadow-teal-500/10">
        Get Started
      </button>
<!-- Secondary Action -->
<button class="text-zinc-400 hover:text-zinc-50 text-sm font-medium transition-colors">
        Import backup
      </button>
<!-- Privacy Assurance -->
<div class="flex items-center gap-2 mt-4 opacity-60" data-purpose="privacy-footer">
<svg class="text-zinc-400" fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="14" xmlns="http://www.w3.org/2000/svg">
<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path>
</svg>
<span class="text-[11px] uppercase tracking-widest text-zinc-400">Your data never leaves your device</span>
</div>
</section>
<!-- END: FooterActions -->
</main>
<!-- END: MainContainer -->
</body></html>
